name: CI

# Every pull request and every push to main proves itself: lint, then
# typecheck and build, then the test suite, in that order, plus the Edge
# Function checks alongside. The build needs no secrets; the VITE_ values
# are read by client code at runtime, not at build time, so vite build
# succeeds without them.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: typecheck and build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    name: test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test

  # The Edge Function parser tests are hermetic Deno tests pinned against
  # real FA fixture pages; npm ci first because Deno resolves the npm
  # specifiers in fa.ts from node_modules. deno check covers the functions
  # the Vite typecheck never sees.
  functions:
    name: edge functions
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: deno check supabase/functions/fa-import/index.ts supabase/functions/fa-import-programme/index.ts supabase/functions/invite-user/index.ts
      - run: deno test --allow-env --allow-read supabase/functions/_shared/fa_test.ts
