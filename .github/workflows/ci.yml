name: CI

# Every pull request and every push to main proves itself: lint, then
# typecheck and build, then the test suite, in that order, plus the Edge
# Function checks alongside. The build needs no secrets; the VITE_ values
# are read by client code at runtime, not at build time, so vite build
# succeeds without them.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: typecheck and build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    name: test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test

  # The database and Storage policy suite (tests/security), run against a
  # LOCAL Supabase stack only. The suite's helpers refuse any non-local URL
  # (assertLocal in tests/security/stack.ts), and the stack uses the CLI's
  # built in local demo keys, so no service-role or hosted-project credential
  # is ever needed or exposed here. A failure of this job fails CI. npm is
  # cached; Docker image caching and health-check reliability are why this
  # job may stay out of the required checks (a branch-protection decision)
  # until it has proven stable, per docs/security/policy-test-matrix.md.
  security:
    name: security policy suite
    needs: build
    runs-on: ubuntu-latest
    # The whole job is bounded so a wedged container never hangs CI; on a
    # healthy runner it finishes in a few minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # Node 22, not 20: the suite creates real supabase-js clients, whose
      # RealtimeClient needs a WebSocket implementation. Node 20 has no native
      # WebSocket, so the client throws "Node.js 20 detected without native
      # WebSocket support" during global setup; Node 22 provides it natively.
      # This is the version the suite is developed and verified against.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # edge-runtime is excluded: the security suite exercises the database,
      # PostgREST, Auth and Storage only (Edge Functions are out of scope,
      # covered by the separate deno job), and it is the heaviest container to
      # restart, so leaving it out shrinks the restart surface db reset churns
      # through below without changing what is tested.
      - name: Start the local Supabase stack
        run: npx supabase start -x edge-runtime
      # Belt and braces: start already blocks until healthy, but confirm the
      # gateway can reach PostgREST and Storage before resetting, so the reset
      # never runs against a half-ready stack.
      - name: Wait for the local stack to be reachable
        run: |
          for i in $(seq 1 60); do
            storage=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:54321/storage/v1/bucket || echo 000)
            rest=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:54321/rest/v1/ || echo 000)
            if [ "$storage" != "502" ] && [ "$storage" != "000" ] && [ "$rest" != "502" ] && [ "$rest" != "000" ]; then
              echo "stack reachable (storage=$storage rest=$rest)"; exit 0
            fi
            echo "waiting for stack (storage=$storage rest=$rest)"; sleep 3
          done
          echo "stack did not become reachable"; exit 1
      # db reset applies every migration (including 0030's self-verification)
      # and the seed, then restarts the containers and probes the Storage API
      # through Kong. On a cold restart that probe can transiently 502 before
      # storage is reachable again, and the pinned CLI treats it as fatal
      # (root cause of the earlier red run). Retry ONLY that transient: a Kong
      # 502, or a hang waiting on the storage upstream. A real migration, seed
      # or grant/self-verification failure carries no storage 502 and fails
      # immediately without retry, so genuine regressions are never masked.
      - name: Apply migrations and seed
        run: |
          log=$(mktemp)
          for attempt in 1 2 3 4 5; do
            echo "::group::db reset attempt $attempt"
            timeout 240 npx supabase db reset 2>&1 | tee "$log"
            rc=${PIPESTATUS[0]}
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then echo "db reset succeeded on attempt $attempt"; exit 0; fi
            if [ "$rc" -eq 124 ] || grep -q "Error status 502" "$log"; then
              echo "attempt $attempt hit the transient storage readiness issue (rc=$rc); waiting for storage before retry"
              for i in $(seq 1 40); do
                code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:54321/storage/v1/bucket || echo 000)
                if [ "$code" != "502" ] && [ "$code" != "000" ]; then break; fi
                sleep 3
              done
            else
              echo "db reset failed with a non-transient error (rc=$rc); not retrying"; exit 1
            fi
          done
          echo "db reset did not succeed after retries"; exit 1
      - name: Run the security policy suite
        run: npm run test:security
      - name: Stop the local Supabase stack
        if: always()
        run: npx supabase stop --no-backup

  # The Edge Function parser tests are hermetic Deno tests pinned against
  # real FA fixture pages; npm ci first because Deno resolves the npm
  # specifiers in fa.ts from node_modules. deno check covers the functions
  # the Vite typecheck never sees.
  functions:
    name: edge functions
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: deno check supabase/functions/fa-import/index.ts supabase/functions/fa-import-programme/index.ts supabase/functions/invite-user/index.ts supabase/functions/remove-user/index.ts supabase/functions/spond-sync/index.ts supabase/functions/spond-roster-import/index.ts supabase/functions/feedback-to-github/index.ts supabase/functions/feedback-github-refresh/index.ts supabase/functions/manage-content-share/index.ts supabase/functions/read-content-share/index.ts
      - run: deno test --allow-env --allow-read supabase/functions/_shared/fa_test.ts supabase/functions/_shared/spond_test.ts supabase/functions/_shared/spond_roster_test.ts supabase/functions/_shared/github_test.ts supabase/functions/_shared/share_test.ts
